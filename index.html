<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<link rel="icon" type="image/png" href="favicon-32.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1428A0">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --paper:#FFFFFF;
    --paper-line:#ECEEF3;
    --paper-line2:#F2F3F6;
    --border-input:#DDE0E7;
    --dash-border:#D6DAE3;
    --cover:#1428A0;
    --cover-light:#2F5FDE;
    --ink:#16181D;
    --ink-mid:#4A4F59;
    --ink-faint:#7A7F8A;
    --ink-faint2:#9A9FAA;
    --ink-faint3:#B0B4BD;
    --bg-soft:#F8F9FC;
    --bg-chip:#F4F5F7;
    --stamp-red:#A8382C;
    --stamp-green:#2C6E49;
    --accent:#2F5FDE;
    --card-shadow:0 4px 14px rgba(20,40,80,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    font-family:'Pretendard', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'Pretendard', sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-0.01em;}
  .serif{font-family:'Pretendard', sans-serif; font-weight:800; letter-spacing:-0.01em;}
  #app{max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:110px;}

  /* Top-level app tabs */
  .top-tab-bar{
    display:flex; background:var(--paper); position:sticky; top:0; z-index:30;
    border-bottom:1px solid var(--paper-line);
  }
  .top-tab-btn{
    flex:1; padding:15px 4px; background:none; border:none; cursor:pointer;
    font-size:14px; font-weight:600; color:var(--ink-faint2);
    border-bottom:2.5px solid transparent;
  }
  .top-tab-btn.active{color:var(--cover); font-weight:800; border-bottom-color:var(--cover);}

  /* Cover */
  .cover{
    background:linear-gradient(135deg, var(--cover), var(--cover-light));
    padding:28px 20px 26px;
    position:relative;
    overflow:hidden;
    border-radius:0 0 28px 28px;
  }
  .cover .ring1{position:absolute; width:170px; height:170px; border-radius:9999px; background:rgba(255,255,255,0.08); top:-70px; right:-50px; border:none;}
  .cover .ring2{display:none;}
  .settings-btn{position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.18); border-radius:10px; border:none; cursor:pointer; padding:8px; display:flex;}
  .eyebrow{color:rgba(255,255,255,0.65); letter-spacing:0.3em; font-size:11px; position:relative;}
  .cover h1{color:#FFFFFF; font-size:20px; font-weight:800; margin:0; position:relative;}
  .balance-label{color:rgba(255,255,255,0.75); font-size:13px; margin:0 0 4px; position:relative;}
  .balance-value{color:#FFFFFF; font-size:32px; font-weight:800; letter-spacing:-0.02em; margin:0; position:relative;}
  .balance-value span{font-size:16px; margin-left:4px;}

  /* Month nav */
  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 20px; border-bottom:1px solid var(--paper-line);
  }
  .month-nav button{background:none; border:none; color:var(--ink); cursor:pointer; padding:6px; display:flex;}
  .month-nav span{font-size:16px; font-weight:700;}

  /* Summary cards */
  .summary{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px 20px;}
  .card{background:#fff; border:1px solid var(--paper-line); border-radius:16px; padding:14px 16px; box-shadow:var(--card-shadow);}
  .card p:first-child{color:var(--ink-faint); font-size:12px; margin:0 0 4px;}
  .card p:last-child{font-size:18px; font-weight:600; margin:0;}
  .card.income p:last-child{color:var(--stamp-green);}
  .card.expense p:last-child{color:var(--stamp-red);}

  .error-box{margin:0 20px 12px; padding:8px 12px; background:#FDECEA; color:var(--stamp-red); border-radius:8px; font-size:13px;}

  /* Ledger list */
  .section-label{color:var(--ink-faint); font-size:12px; margin:0 20px 6px; padding-top:4px;}
  .ledger{background:#fff; border:1px solid var(--paper-line); border-radius:16px; overflow:hidden; margin:0 20px; box-shadow:var(--card-shadow);}
  .ledger-empty{padding:24px; text-align:center; color:var(--ink-faint); font-size:13px;}
  .ledger-row{display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px dashed var(--paper-line); cursor:pointer;}
  .ledger-row:hover{background:#F5F7FC;}
  .ledger-row:last-child{border-bottom:none;}
  .cat-icon{
    width:34px; height:34px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--c);
  }
  .ledger-row .row-payment{font-weight:700;}
  .row-main{flex:1; min-width:0;}
  .row-top{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .row-top .cat-name{font-size:14px; font-weight:700; color:var(--ink);}
  .row-date{color:var(--ink-faint2); font-size:11.5px; margin:2px 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row-amt{text-align:right; flex-shrink:0;}
  .row-amt p{margin:0;}
  .row-amt .amt{font-size:14px; font-weight:800;}
  .row-amt .bal{color:var(--ink-faint3); font-size:10.5px;}
  .del-btn{background:none; border:none; color:var(--ink-faint); cursor:pointer; flex-shrink:0; margin-left:2px; padding:4px;}

  /* Tab bar */
  .tab-bar{display:flex; gap:8px; padding:14px 20px 0;}
  .tab-btn{
    flex:1; padding:10px 0; border-radius:12px; border:none;
    background:var(--bg-chip); color:var(--ink-faint); font-size:13.5px; font-weight:700; cursor:pointer;
  }
  .tab-btn.active{background:linear-gradient(135deg, var(--cover), var(--cover-light)); color:#FFFFFF; font-weight:700;}

  /* Category breakdown */
  .breakdown{padding:20px;}
  .breakdown-card{background:#fff; border:1px solid var(--paper-line); border-radius:16px; padding:16px; box-shadow:var(--card-shadow);}
  .bd-row{margin-bottom:12px;}
  .bd-row:last-child{margin-bottom:0;}
  .bd-top{display:flex; justify-content:space-between; margin-bottom:4px;}
  .bd-top .bd-name{font-size:13px;}
  .bd-top .bd-val{color:var(--ink-faint); font-size:12px;}
  .bd-track{background:var(--paper-line); height:6px; border-radius:3px; overflow:hidden;}
  .bd-fill{background:var(--stamp-red); height:100%;}
  .payment-row{display:flex; align-items:flex-start; gap:10px; cursor:pointer; padding:6px; margin:-6px -6px 6px; border-radius:8px;}
  .bd-row-clickable{cursor:pointer; padding:6px; margin:-6px -6px 6px; border-radius:8px;}
  .bd-row-clickable:hover{background:#F5F7FC;}
  .bd-row-clickable.active{background:#EAF0FE;}
  .payment-row:hover{background:#F5F7FC;}
  .payment-row.active{background:#EAF0FE;}
  .pay-icon{color:var(--stamp-red); flex-shrink:0; margin-top:2px;}
  .payment-total{
    display:flex; justify-content:space-between; margin-top:14px; padding-top:12px;
    border-top:1px solid var(--paper-line); font-size:13px; font-weight:700; color:var(--ink);
  }

  /* Payment tag on ledger row */
  .row-payment{
    font-size:10.5px; font-weight:700;
    border-radius:8px; padding:2px 7px; flex-shrink:0;
  }

  /* Payment chips in form */
  .pay-grid{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;}
  .pay-opt{display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; border:none; cursor:pointer;}

  /* Floating buttons */
  .fab-wrap{position:fixed; bottom:24px; right:max(20px, calc(50% - 220px)); display:flex; flex-direction:column; gap:12px; align-items:flex-end; z-index:40;}
  .fab-income{background:var(--stamp-green); border:none; color:#fff; border-radius:26px; padding:13px 20px; font-size:14.5px; font-weight:800; display:flex; align-items:center; gap:4px; cursor:pointer; box-shadow:0 8px 20px rgba(44,110,73,0.35);}
  .fab-expense{background:var(--stamp-red); color:#fff; border:none; border-radius:26px; padding:13px 20px; font-size:14.5px; font-weight:800; display:flex; align-items:center; gap:4px; cursor:pointer; box-shadow:0 8px 20px rgba(168,56,44,0.35);}
  .fab-wrap button:active{transform:scale(0.96);}

  /* Modal */
  .overlay{position:fixed; inset:0; background:rgba(10,15,40,0.45); z-index:50; display:none; align-items:flex-end; justify-content:center;}
  .overlay.open{display:flex;}
  .overlay.center{align-items:center; padding:0 32px;}
  .modal{width:100%; max-width:480px; background:var(--paper); border-top-left-radius:22px; border-top-right-radius:22px; padding:20px 20px 28px; -webkit-overflow-scrolling:touch;}
  .modal:not(.modal-confirm)::before{content:''; display:block; width:40px; height:4px; background:#E4E6EB; border-radius:2px; margin:0 auto 16px;}
  .modal-confirm{max-width:360px; background:#fff; border-radius:16px; padding:20px;}
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .modal-head h2{font-size:16px; font-weight:800; margin:0;}
  .modal-head button{background:none; border:none; color:var(--ink-faint); cursor:pointer;}
  .cat-grid{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;}
  .cat-opt{display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; border:none; cursor:pointer;}
  .field{width:100%; padding:11px 12px; margin-bottom:12px; border:1px solid var(--border-input); border-radius:10px; font-size:14px; font-family:inherit; color:var(--ink);}
  .field.mono{font-size:16px;}
  .field-row{display:flex; gap:8px;}
  .field-row .field{flex:1; min-width:0;}
  .field-label{color:var(--ink-faint); font-size:12.5px; font-weight:700; margin:0 0 8px;}
  .submit-btn{width:100%; padding:14px; border:none; border-radius:12px; font-size:14px; font-weight:700; color:#fff; cursor:pointer;}
  .delete-below-btn{
    width:100%; padding:12px; margin-top:10px; border:none; background:none; border-radius:9999px;
    font-size:13px; font-weight:600; color:var(--stamp-red); cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .delete-below-btn:active{background:#FDECEA;}
  .confirm-text{font-size:14px; margin:0 0 16px;}
  .confirm-actions{display:flex; gap:8px;}
  .confirm-actions button{flex:1; padding:10px; border-radius:8px; font-size:13px; cursor:pointer;}
  .btn-cancel{background:#fff; border:1px solid var(--paper-line); color:var(--ink);}
  .btn-delete{background:var(--stamp-red); border:none; color:#fff;}
  .loading{display:flex; align-items:center; justify-content:center; min-height:100vh; color:var(--ink-faint); font-size:14px;}

  /* Fixed expenses (고정비) */
  .cover-title-style h1{font-size:20px; margin-bottom:4px;}
  .cover-subtitle{color:rgba(255,255,255,0.75); font-size:12.5px; margin:0; position:relative;}
  .fixed-total-banner{
    background:linear-gradient(135deg, var(--cover), var(--cover-light)); border-radius:16px; padding:16px;
    display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
    color:rgba(255,255,255,0.85); font-size:13px; font-weight:600;
  }
  .fixed-total-banner .mono{color:#fff; font-size:19px; font-weight:800;}
  .fg-del-btn{background:none; border:none; color:var(--ink-faint2); font-size:11.5px; cursor:pointer; padding:0;}
  .fixed-row{display:flex; align-items:center; gap:10px; padding:12px; cursor:pointer;}
  .fixed-row-card{background:#fff; border:1px solid var(--paper-line); border-radius:12px; margin-bottom:8px;}
  .fixed-row-card:active{background:#F8F9FC;}
  .fixed-checkbox{
    width:20px; height:20px; flex-shrink:0; border-radius:5px; border:1.5px solid var(--dash-border);
    cursor:pointer; display:flex; align-items:center; justify-content:center; background:#fff;
  }
  .fixed-checkbox.checked{background:var(--stamp-green); border-color:var(--stamp-green);}
  .fixed-main{flex:1; min-width:0;}
  .fixed-name-row{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .fixed-name{font-size:13.5px; font-weight:700; color:var(--ink);}
  .pay-tag{font-size:10px; font-weight:700; padding:2px 8px; border-radius:8px; white-space:nowrap;}
  .fixed-meta{color:var(--ink-faint2); font-size:11.5px;}
  .account-inline{display:flex; align-items:center; gap:4px;}
  .copy-inline-btn{background:none; border:none; color:var(--ink-faint); cursor:pointer; padding:1px; display:inline-flex; flex-shrink:0;}
  .fixed-amt{font-size:14px; font-weight:800; color:var(--ink); flex-shrink:0; white-space:nowrap;}
  .fixed-add-btn{
    width:100%; padding:12px; background:none; border:none;
    color:var(--ink-faint); font-size:13px; cursor:pointer;
  }
  .fixed-add-btn.dashed{
    text-align:center; padding:12px; border:1.5px dashed var(--dash-border); border-radius:14px;
    color:var(--ink-faint); font-size:13px; font-weight:600; margin:6px 0 14px;
  }
  .fixed-add-btn:hover{background:#F5F7FC;}
  .fixed-highlight-box{
    display:flex; justify-content:space-between; align-items:center;
    background:#FBF9F0; border:1px solid #F0E6C8; border-radius:14px; padding:14px 16px;
    font-size:13px; font-weight:700; color:#8A6D1D;
  }
  .fixed-highlight-box .mono{font-size:16px; font-weight:800; color:#8A6D1D;}
  .asset-date-row{
    display:flex; align-items:center; justify-content:space-between; padding:0 0 16px;
    font-size:13px; font-weight:700; color:var(--ink);
  }
  .asset-date-row input{border:1px solid var(--border-input); border-radius:10px; padding:9px 10px; font-size:13px; color:var(--ink); font-family:inherit;}
  .asset-save-btn{
    display:flex; align-items:center; gap:4px; border:none; border-radius:10px; padding:9px 18px;
    background:linear-gradient(135deg, var(--cover), var(--cover-light)); color:#fff; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .asset-save-btn:active{opacity:0.85;}
  .asset-snapshot-box{background:var(--bg-soft); border-radius:16px; padding:16px; margin-bottom:4px;}
  .asset-snapshot-title{font-size:13px; font-weight:700; color:var(--ink); margin:0 0 10px;}

  /* Asset bar chart */
  .asset-chart-scroll{overflow-x:auto; padding-bottom:4px;}
  .asset-bar-row{display:flex; align-items:flex-end; gap:14px; min-height:210px; padding:4px 6px 0;}
  .asset-bar-col{display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; width:34px; cursor:pointer; border-radius:6px; padding:4px 0;}
  .asset-bar-col:active{background:#F5F7FC;}
  .asset-bar-col.selected{background:#EAF0FE;}
  .asset-bar-total-label{font-size:9px; color:var(--ink-faint); white-space:nowrap;}
  .asset-bar-stack{
    width:22px; border-radius:4px 4px 0 0; overflow:hidden;
    display:flex; flex-direction:column-reverse; background:var(--paper-line);
  }
  .asset-bar-stack > div{width:100%;}
  .asset-bar-debt-label{font-size:9px; color:var(--stamp-red); white-space:nowrap;}
  .asset-bar-date{font-size:10px; color:var(--ink-faint); white-space:nowrap;}
  .asset-chart-legend{display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; padding-top:12px; border-top:1px solid var(--paper-line);}
  .asset-chart-legend .asset-legend-row{padding:0; font-size:12px;}

  /* Asset categories & reorder */
  .asset-cat-group{padding:4px 0 10px;}
  .asset-cat-header{
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    padding:0 0 8px; margin:0;
  }
  .asset-cat-tag{font-size:12px; font-weight:700; padding:4px 10px; border-radius:8px;}
  .asset-cat-dot{width:10px; height:10px; border-radius:9999px; flex-shrink:0;}
  .asset-reorder{display:flex; flex-direction:column; gap:1px; flex-shrink:0;}
  .asset-reorder button{
    background:#F5F7FC; border:none; color:var(--ink-faint); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    width:24px; height:17px; border-radius:5px; padding:0;
  }
  .asset-item-row{padding:8px 12px;}
  .asset-item-row .fixed-name{font-size:13px;}
  .asset-item-row .fixed-amt{font-size:13px;}
  .asset-reorder button:active{background:#E4E8F0;}
  .asset-reorder button:disabled{opacity:0.2; cursor:default; background:transparent;}
  .asset-legend-row{
    display:flex; align-items:center; gap:8px; padding:6px 4px; border-radius:6px; cursor:pointer; font-size:13px;
  }
  .asset-legend-row:hover{background:#F5F7FC;}
  .asset-legend-row.active{background:#EAF0FE;}
  .asset-legend-name{flex:1; min-width:0; color:var(--ink);}

  .add-group-btn{
    width:100%; padding:12px; background:#fff; border:1.5px dashed var(--dash-border); border-radius:14px;
    color:var(--ink-faint); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }

  /* Salary management cards */
  .salary-card{background:#fff; border:1px solid var(--paper-line); border-radius:14px; padding:14px 16px; margin-bottom:10px;}
  .salary-bank{font-size:14.5px; font-weight:700; color:var(--ink); margin:0;}
  .salary-row{display:flex; align-items:center; gap:6px; margin-top:8px;}
  .salary-row-text{font-size:13px; color:var(--ink-faint); flex:1; min-width:0;}
  .salary-amount{font-size:16px; font-weight:800; color:var(--stamp-green); flex:1; min-width:0;}
  .salary-copy-btn{
    font-size:11px; font-weight:700; color:var(--cover); background:#F0F2FC; border:none;
    padding:4px 8px; border-radius:8px; cursor:pointer; flex-shrink:0;
  }
  .prepaid-row{display:flex; align-items:center; gap:8px; margin-bottom:14px; cursor:pointer; font-size:13px; color:var(--ink);}

  /* Settings: full-screen panel */
  .settings-overlay{align-items:stretch; justify-content:stretch; background:none;}
  .settings-screen{width:100%; max-width:480px; margin:0 auto; height:100vh; background:#fff; overflow-y:auto;}
  .settings-header{
    position:sticky; top:0; background:#fff; border-bottom:1px solid var(--paper-line);
    padding:16px 20px; display:flex; align-items:center; gap:12px; z-index:1;
  }
  .settings-header button{background:none; border:none; color:var(--ink); cursor:pointer; display:flex;}
  .settings-header h2{font-size:16px; font-weight:800; margin:0; color:var(--ink);}
  .settings-list{overflow-y:visible; margin-bottom:12px;}
  .fixed-check-list{margin-bottom:12px;}
  .fixed-check-row{
    display:grid; grid-template-columns:18px 1fr 72px 88px; align-items:center; gap:8px;
    padding:8px 0; border-bottom:1px dashed var(--paper-line);
    font-size:13px; color:var(--ink); cursor:pointer;
  }
  .fixed-check-row:last-child{border-bottom:none;}
  .fixed-check-row input[type="checkbox"]{width:16px; height:16px;}
  .fixed-check-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0;}
  .fixed-check-row .pay-tag{justify-self:start; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fixed-check-row .mono{text-align:right; justify-self:end;}
  .salary-total-row{
    display:flex; justify-content:space-between; align-items:center; padding:12px 14px; margin-bottom:14px;
    background:var(--bg-soft); border-radius:12px; font-size:14px; font-weight:700; color:var(--ink);
  }
  .settings-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--paper-line2);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row-icon{
    width:30px; height:30px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .settings-name-input{
    flex:1; min-width:0; border:1px solid transparent; background:none; padding:6px 8px; border-radius:6px;
    font-size:13.5px; color:var(--ink); font-family:inherit;
  }
  .settings-name-input:focus{border-color:var(--border-input); background:#fff; outline:none;}
  .settings-icon-btn{background:none; border:none; color:var(--ink-faint3); cursor:pointer; padding:4px; flex-shrink:0; font-size:12px;}
  .add-row{display:flex; gap:8px;}
  .add-row .field{flex:1; margin-bottom:0;}
  .add-row button{
    padding:0 16px; border:none; border-radius:10px; background:linear-gradient(135deg, var(--cover), var(--cover-light)); color:#fff;
    font-size:13px; font-weight:700; cursor:pointer;
  }

  svg{display:block;}
</style>
</head>
<body>

<div id="app">
  <div class="loading" id="loading">불러오는 중...</div>
</div>

<script>
function getDefaultExpenseCats(){
  return [
    {name:"식비", icon:"utensils"},
    {name:"생활용품", icon:"shopping-bag"},

function copyToClipboard(text, btnEl){
  const showCopied = () => {
    if(!btnEl) return;
    const original = btnEl.innerHTML;
    btnEl.innerHTML = icon('check', 14, 'var(--stamp-green)');
    setTimeout(() => { btnEl.innerHTML = original; }, 1200);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showCopied).catch(showCopied);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    showCopied();
  }
}
function copyAccountNumber(account, btnEl){

// Storage wrapper:
// - Inside a Claude artifact, uses window.storage.
// - Outside Claude (this file opened/hosted directly), syncs with Supabase so data
//   is shared across devices/browsers, and falls back to localStorage if the
//   network/Supabase call fails (so the app still works offline).
const SUPABASE_URL = 'https://djeczuzsrmfaktiuqhqs.supabase.co/rest/v1/';
const SUPABASE_KEY = 'sb_publishable_yntqlWZfKgUnyrDn0vSVmQ_uda29sEP';

async function storageGet(key){
  if(typeof window.storage !== 'undefined' && window.storage){
    return await window.storage.get(key, false);
  }
  try{
    const res = await fetch(`${SUPABASE_URL}app_storage?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      },
    });
    if(!res.ok) throw new Error('supabase get failed');
    const rows = await res.json();
    if(rows && rows.length > 0){
      const value = JSON.stringify(rows[0].value);
      localStorage.setItem(key, value); // keep a local cache for offline use
      return {key, value, shared:false};
    }
    return null;
  }catch(e){
    const v = localStorage.getItem(key);
    return v !== null ? {key, value: v, shared:false} : null;
  }
}
async function storageSet(key, value){
  if(typeof window.storage !== 'undefined' && window.storage){
    return await window.storage.set(key, value, false);
  }
  localStorage.setItem(key, value); // always cache locally first, so data is never lost
  try{
    const res = await fetch(`${SUPABASE_URL}app_storage?on_conflict=key`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal',
      },
      body: JSON.stringify([{key, value: JSON.parse(value), updated_at: new Date().toISOString()}]),
    });
    if(!res.ok) throw new Error('supabase set failed: ' + res.status);
  }catch(e){
    // Cloud sync failed (offline / network issue), but the data is safe in
    // localStorage on this device, so don't alarm the user — just log it.
    console.warn('Supabase sync failed, saved locally instead:', e);
  }
  return {key, value, shared:false};
}

function hashHue(name){

function buildAssetDonutSVG(byCategory){
  const entries = ASSET_CATEGORIES
    .map(c => ({name:c, color:assetCategoryColor(c), raw: byCategory[c] || 0, value: Math.abs(byCategory[c] || 0)}))
    .filter(e => e.value > 0);
  const total = entries.reduce((s,e)=>s+e.value, 0);
  if(total <= 0) return {svg:'', entries:[]};
  const cx=90, cy=90, r=70, innerR=42;
  let cumulative = 0;
  const paths = entries.map(e => {
    const startAngle = (cumulative/total) * 2*Math.PI - Math.PI/2;
    cumulative += e.value;
    const endAngle = (cumulative/total) * 2*Math.PI - Math.PI/2;
    const x1 = cx + r*Math.cos(startAngle), y1 = cy + r*Math.sin(startAngle);
    const x2 = cx + r*Math.cos(endAngle), y2 = cy + r*Math.sin(endAngle);
    const ix1 = cx + innerR*Math.cos(startAngle), iy1 = cy + innerR*Math.sin(startAngle);
    const ix2 = cx + innerR*Math.cos(endAngle), iy2 = cy + innerR*Math.sin(endAngle);
    const largeArc = (endAngle-startAngle) > Math.PI ? 1 : 0;
    const d = e.value >= total
      ? `M ${cx-r} ${cy} A ${r} ${r} 0 1 1 ${cx+r} ${cy} A ${r} ${r} 0 1 1 ${cx-r} ${cy} Z`
      : `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${innerR} ${innerR} 0 ${largeArc} 0 ${ix1} ${iy1} Z`;
    return `<path d="${d}" fill="${e.color}" stroke="#fff" stroke-width="2"/>`;
  }).join('');
  return {svg: `<svg viewBox="0 0 180 180" width="180" height="180">${paths}</svg>`, entries};
}

function computeData(){
  const dt = (e) => `${e.date}T${e.time || '00:00'}`;
  const sortedAll = [...entries].sort((a,b)=> {
    const da = dt(a), db = dt(b);
    return da === db ? a.id-b.id : (da < db ? -1 : 1);
  });
  let running = 0;
  const withBalance = sortedAll.map(e=>{
    running += e.type === 'income' ? e.amount : -e.amount;
    return {...e, balance: running};
  });
  const inMonth = withBalance
    .filter(e=> monthKey(e.date) === currentMonth)
    .sort((a,b)=> {
      const da = dt(a), db = dt(b);
      return da === db ? b.id-a.id : (da > db ? -1 : 1);
    });

  const monthIncome = inMonth.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const monthExpense = inMonth.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

  const byCat = {};
  inMonth.filter(e=>e.type==='expense').forEach(e=>{
    byCat[e.category] = (byCat[e.category]||0) + e.amount;
  });
  const catBreakdown = Object.entries(byCat).map(([name,amount])=>({name,amount})).sort((a,b)=>b.amount-a.amount);

  const byPayment = {};
  inMonth.filter(e=>e.type==='expense').forEach(e=>{
    const key = e.payment || '미지정';
    if(!byPayment[key]) byPayment[key] = {amount:0, count:0};
    byPayment[key].amount += e.amount;
    byPayment[key].count += 1;
  });
  const paymentOrder = [...paymentMethods, '미지정'];
  const paymentBreakdown = paymentOrder
    .filter(name => byPayment[name])
    .map(name => ({name, amount: byPayment[name].amount, count: byPayment[name].count}))
    .sort((a,b)=>b.amount-a.amount);

  const totalBalance = withBalance.length ? withBalance[withBalance.length-1].balance : 0;

  return {monthEntries: inMonth, monthIncome, monthExpense, totalBalance, catBreakdown, paymentBreakdown};
}

async function moveAssetItem(itemId, direction){
  const it = assetItems.find(x => x.id === itemId);
  if(!it) return;
  const cat = it.category || '기타';
  const sameCat = assetItems.filter(x => (x.category || '기타') === cat);
  const idxInCat = sameCat.findIndex(x => x.id === itemId);
  const swapWith = sameCat[idxInCat + direction];
  if(!swapWith) return;
  const globalIdxA = assetItems.findIndex(x => x.id === it.id);
  const globalIdxB = assetItems.findIndex(x => x.id === swapWith.id);
  [assetItems[globalIdxA], assetItems[globalIdxB]] = [assetItems[globalIdxB], assetItems[globalIdxA]];
  await persistAssetItems();
  render();
}

}

// --- Salary management item actions ---
function openAddSalaryItemForm(groupId){
  salaryEditingItemId = null;
  salaryItemForm = {groupId, name:'', account:'', extraAmount:'', amount:'0'};
  salaryCheckedFixedIds = [];
  salaryItemFormOpen = true;
  render();
}
function openEditSalaryItemForm(groupId, itemId){
  const g = salaryGroups.find(x => x.id === groupId);
  const it = g && g.items.find(x => x.id === itemId);
  if(!it) return;
  salaryEditingItemId = itemId;
  // Restore whichever fixed-expense items were checked last time.
  salaryCheckedFixedIds = [...(it.checkedFixedIds || [])];
  const fg = fixedGroups.find(f => f.name === g.name);
  const fixedSum = fg ? fg.items.filter(fi => salaryCheckedFixedIds.includes(fi.id)).reduce((s,fi)=>s+fi.amount,0) : 0;
  const extra = it.amount - fixedSum;
  salaryItemForm = {groupId, name:it.name, account:it.account || '', extraAmount:String(extra), amount:String(it.amount)};
  salaryItemFormOpen = true;
  render();
}
function closeSalaryItemForm(){
  salaryItemFormOpen = false;
  salaryEditingItemId = null;
  salaryCheckedFixedIds = [];
  render();
}
function matchedFixedGroupForSalary(){
  const sg = salaryGroups.find(x => x.id === salaryItemForm.groupId);
  if(!sg) return null;
  return fixedGroups.find(fg => fg.name === sg.name) || null;
}
function recomputeSalaryAmount(){
  const fg = matchedFixedGroupForSalary();
  const fixedSum = fg ? fg.items.filter(it => salaryCheckedFixedIds.includes(it.id)).reduce((s,it)=>s+it.amount,0) : 0;
  const extra = parseInt((salaryItemForm.extraAmount || '').replace(/[^0-9-]/g,''), 10) || 0;
  salaryItemForm.amount = String(fixedSum + extra);
}
function updateSalaryTotalDisplay(){
  const totalEl = document.getElementById('salary-total-value');
  if(!totalEl) return;
  const n = parseInt(salaryItemForm.amount, 10) || 0;
  totalEl.textContent = (n < 0 ? '-' : '') + fmt(Math.abs(n)) + '원';
}
function toggleSalaryFixedCheck(fixedItemId){
  const idx = salaryCheckedFixedIds.indexOf(fixedItemId);
  if(idx === -1) salaryCheckedFixedIds.push(fixedItemId);
  else salaryCheckedFixedIds.splice(idx, 1);

  recomputeSalaryAmount();
  updateSalaryTotalDisplay();
}
function updateSalaryExtraAmount(value){
  salaryItemForm.extraAmount = value;
  recomputeSalaryAmount();
  updateSalaryTotalDisplay();
}
async function submitSalaryItem(){
  const name = document.getElementById('si-name').value.trim();
  const account = document.getElementById('si-account').value.trim();
  const extraEl = document.getElementById('si-extra');
  if(extraEl) salaryItemForm.extraAmount = extraEl.value;
  recomputeSalaryAmount();
  const amount = parseInt(salaryItemForm.amount, 10);
  if(!name){
    showError('항목명을 입력해 주세요.');
    return;
  }
  if(isNaN(amount) || amount === 0){
    showError('금액을 올바르게 입력해 주세요.');
    return;
  }
  const g = salaryGroups.find(x => x.id === salaryItemForm.groupId);
  if(!g) return;
  const checkedFixedIds = [...salaryCheckedFixedIds];
  if(salaryEditingItemId){
    const idx = g.items.findIndex(x => x.id === salaryEditingItemId);
    if(idx !== -1){
      g.items[idx] = {...g.items[idx], name, account, amount, checkedFixedIds};
    }
  } else {
    g.items.push({id:'si-'+Date.now(), name, account, amount, checkedFixedIds});
  }
  await persistSalary();
  salaryItemFormOpen = false;
  salaryEditingItemId = null;
  salaryCheckedFixedIds = [];
  render();
}
function askDeleteSalaryItem(groupId, itemId){
  salaryConfirmDelete = {groupId, itemId};
  render();
}
function cancelDeleteSalaryItem(){
  salaryConfirmDelete = null;
  render();
}
async function doDeleteSalaryItem(){
  const {groupId, itemId} = salaryConfirmDelete;
  const g = salaryGroups.find(x => x.id === groupId);
  if(g) g.items = g.items.filter(x => x.id !== itemId);
  await persistSalary();
  salaryConfirmDelete = null;
  salaryItemFormOpen = false;
  salaryEditingItemId = null;
  render();
}

  function renderItemRow(it, idxInCat, catItemsLen){

    ? `<div class="ledger-empty">등록된 항목이 없습니다.</div>`
    : ASSET_CATEGORIES.filter(cat => assetItems.some(it => (it.category || '기타') === cat)).map(cat => {
        const catItems = assetItems.filter(it => (it.category || '기타') === cat);
        const catSum = catItems.reduce((s,it)=>s+it.amount, 0);
        return `
        <div class="asset-cat-group">
          <p class="asset-cat-header">
            <span class="asset-cat-tag" style="${assetCategoryTagStyle(cat)}">${escapeHtml(cat)}</span>

          </p>
          ${catItems.map((it,i)=>renderItemRow(it, i, catItems.length)).join('')}
        </div>`;
      }).join('');

  const history = [...assetHistory].sort((a,b)=> a.date < b.date ? -1 : (a.date > b.date ? 1 : 0));
  const maxNet = Math.max(1, ...history.map(h => h.total));
  const barMaxPx = 160;
  const barsHtml = history.map(h => {
    const positiveCats = ASSET_CATEGORIES.filter(c => c !== '대출' && (h.byCategory[c] || 0) > 0);
    const positiveSum = positiveCats.reduce((s,c)=> s + (h.byCategory[c] || 0), 0);
    const debtAmount = h.byCategory['대출'] || 0;
    const barPx = h.total > 0 ? Math.max(4, Math.round((h.total / maxNet) * barMaxPx)) : 4;
    const segmentsHtml = h.total > 0 && positiveSum > 0
      ? positiveCats.map(c => {
          const share = (h.byCategory[c] || 0) / positiveSum;
          const segPx = Math.round(share * barPx);
          return `<div style="height:${segPx}px; background:${assetCategoryColor(c)};" title="${escapeHtml(c)}"></div>`;
        }).join('')
      : `<div style="height:${barPx}px; background:var(--paper-line);"></div>`;

  const selectedSnap = history.find(h => h.id === selectedAssetSnapshotId);
  let snapshotDetailHtml = '';

    const {svg, entries} = buildAssetDonutSVG(selectedSnap.byCategory);

      <div class="breakdown-card" style="margin-top:12px; display:flex; flex-direction:column; align-items:center; gap:14px;">

        <div style="width:100%;">
          ${entries.map(e => `
            <div class="asset-legend-row" style="cursor:default;">
              <span class="asset-cat-dot" style="background:${e.color};"></span>

        <div class="confirm-actions">
          <button class="btn-cancel" onclick="cancelDeleteAssetItem()">취소</button>
          <button class="btn-delete" onclick="doDeleteAssetItem()">삭제</button>
        </div>
      </div>
    </div>
  `;
}

function renderSalaryTab(){
  ensureSalaryActiveGroup();
  const grandTotal = salaryGroups.reduce((s,g)=> s + g.items.reduce((s2,it)=>s2+it.amount,0), 0);

  function renderSalaryGroupCard(g){
    const rows = g.items.length === 0
      ? `<div class="ledger-empty">등록된 항목이 없습니다.</div>`
      : g.items.map(it => `
          <div class="salary-card">
            <div style="cursor:pointer;" onclick="openEditSalaryItemForm('${g.id}','${it.id}')">
              <p class="salary-bank">${escapeHtml(it.name)}</p>
            </div>
            ${it.account ? `
              <div class="salary-row">
                <span class="salary-row-text">${escapeHtml(it.account)}</span>
                <button class="salary-copy-btn" onclick="copyToClipboard('${escapeHtml(it.account)}', this)">복사</button>
              </div>
            ` : ''}
            <div class="salary-row">
              <span class="salary-amount mono">${fmt(it.amount)}원</span>
              <button class="salary-copy-btn" onclick="copyToClipboard('${it.amount}', this)">복사</button>
            </div>
          </div>`).join('');
    return `
      ${rows}
      <button class="fixed-add-btn dashed" onclick="openAddSalaryItemForm('${g.id}')">+ 계좌 추가</button>`;
  }

  const activeGroup = salaryGroups.find(g => g.id === salaryActiveGroupId);
  const groupTabsHtml = `
    <div class="tab-bar" style="overflow-x:auto;">
      ${salaryGroups.map(g => `
        <button class="tab-btn" style="${g.id===salaryActiveGroupId ? 'background:linear-gradient(135deg,var(--cover),var(--cover-light));color:#fff;' : ''}" onclick="switchSalaryGroup('${g.id}')">${escapeHtml(g.name)}</button>
      `).join('')}
      <button class="tab-btn" style="flex:none; padding:10px 16px;" onclick="openAddSalaryGroupForm()">+ 그룹</button>
    </div>`;

  const matchedFixedGroup = matchedFixedGroupForSalary();

  return `
    <div class="cover cover-title-style">
      <div class="ring1"></div>
      <h1 class="serif">월급 관리</h1>
      <p class="cover-subtitle">급여가 들어오는 계좌를 관리하세요</p>
    </div>

    ${groupTabsHtml}

    ${errorMsg ? `<div class="error-box">${escapeHtml(errorMsg)}</div>` : ''}

    <div style="padding:6px 20px 20px;">
      ${salaryGroups.length === 0 ? `<div class="ledger-empty">아직 그룹이 없습니다.</div>` : (activeGroup ? renderSalaryGroupCard(activeGroup) : '')}
    </div>

    <div class="overlay ${salaryItemFormOpen ? 'open' : ''}" onclick="closeSalaryItemForm()">
      <div id="salary-item-modal" class="modal" onclick="event.stopPropagation()" style="max-height:82vh; overflow-y:auto;">
        <div class="modal-head">
          <h2 class="serif">${salaryEditingItemId ? '항목 수정' : '항목 추가'}</h2>
          <button onclick="closeSalaryItemForm()">${icon('x',20)}</button>
        </div>
        <input id="si-name" type="text" placeholder="은행 / 증권사 이름 (예: 신한은행)" class="field" value="${escapeHtml(salaryItemForm.name)}">
        <input id="si-account" type="text" inputmode="text" placeholder="계좌번호 (선택)" class="field mono" value="${escapeHtml(salaryItemForm.account || '')}">
        ${matchedFixedGroup && matchedFixedGroup.items.length ? `
          <p class="field-label">고정비에서 합산해서 가져오기 (선택, 여러 개 체크 가능)</p>
          <div class="fixed-check-list">
            ${matchedFixedGroup.items.map(fi => {
              return `
              <label class="fixed-check-row">
                <input type="checkbox" ${salaryCheckedFixedIds.includes(fi.id) ? 'checked' : ''} onchange="toggleSalaryFixedCheck('${fi.id}')">
                <span class="fixed-check-name">${escapeHtml(fi.name)}</span>
                <span>${fi.payment ? `<span class="pay-tag" style="${paymentTagStyle(fi.payment)}">${escapeHtml(fi.payment)}</span>` : ''}</span>
                <span class="mono">${fmt(fi.amount)}원</span>
              </label>
            `;}).join('')}
          </div>
        ` : ''}
        <p class="field-label">추가 금액 (직접 입력, 체크한 고정비 합계에 더해져요)</p>
        <input id="si-extra" type="text" inputmode="text" placeholder="0" class="field mono" value="${salaryItemForm.extraAmount}" onchange="updateSalaryExtraAmount(this.value)">
        <div class="salary-total-row">
          <span>합계 금액</span>
          <span id="salary-total-value" class="mono">${(parseInt(salaryItemForm.amount,10)||0) < 0 ? '-' : ''}${fmt(Math.abs(parseInt(salaryItemForm.amount,10)||0))}원</span>
        </div>
        <button class="submit-btn" style="background:var(--accent)" onclick="submitSalaryItem()">${salaryEditingItemId ? '수정하기' : '추가하기'}</button>
        ${salaryEditingItemId ? `<button class="delete-below-btn" onclick="askDeleteSalaryItem('${salaryItemForm.groupId}', '${salaryEditingItemId}')">${icon('trash-2',14)} 삭제하기</button>` : ''}
      </div>
    </div>

    <div class="overlay center ${salaryGroupFormOpen ? 'open' : ''}" onclick="closeAddSalaryGroupForm()">
      <div class="modal modal-confirm" onclick="event.stopPropagation()">
        <p class="confirm-text" style="font-weight:700;">새 그룹</p>
        <input id="sg-name" type="text" placeholder="그룹 이름 (예: 은지)" class="field">
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="closeAddSalaryGroupForm()">취소</button>
          <button class="btn-delete" style="background:var(--stamp-green)" onclick="submitAddSalaryGroup()">추가</button>
        </div>
      </div>
    </div>

    <div class="overlay center ${salaryConfirmDelete ? 'open' : ''}" onclick="cancelDeleteSalaryItem()">
      <div class="modal modal-confirm" onclick="event.stopPropagation()">
        <p class="confirm-text">이 항목을 삭제할까요? 삭제하면 되돌릴 수 없습니다.</p>
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="cancelDeleteSalaryItem()">취소</button>
          <button class="btn-delete" onclick="doDeleteSalaryItem()">삭제</button>
        </div>
      </div>
    </div>

    <div class="overlay center ${salaryConfirmDeleteGroup ? 'open' : ''}" onclick="cancelDeleteSalaryGroup()">
      <div class="modal modal-confirm" onclick="event.stopPropagation()">
        <p class="confirm-text">이 그룹과 그 안의 모든 항목을 삭제할까요? 삭제하면 되돌릴 수 없습니다.</p>
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="cancelDeleteSalaryGroup()">취소</button>
          <button class="btn-delete" onclick="doDeleteSalaryGroup()">삭제</button>
        </div>
      </div>
    </div>
  `;
}

function render(){
  const {monthEntries, monthIncome, monthExpense, totalBalance, catBreakdown, paymentBreakdown} = computeData();
  const activeCats = form.type === 'income' ? INCOME_CATS : expenseCats;

  const today = todayStr();
  const pastEntries = monthEntries.filter(e => e.date <= today);
  const futureEntries = monthEntries.filter(e => e.date > today);
  const rowsHtml = renderRows(pastEntries, '이번 달 기록이 없습니다. 아래 + 버튼으로 첫 기록을 남겨보세요.');
  const upcomingRowsHtml = renderRows(futureEntries, '');

  const breakdownHtml = catBreakdown.length === 0 ? '' : `
    <div class="breakdown">
      <p class="section-label" style="margin:0 0 8px;">카테고리별 지출</p>
      <div class="breakdown-card">
        ${catBreakdown.map(c=>{
          const pct = monthExpense ? Math.round((c.amount/monthExpense)*100) : 0;
          const active = selectedCategoryFilter === c.name;
          const barColor = catBadgeColor('expense', c.name);
          return `
          <div class="bd-row bd-row-clickable ${active ? 'active' : ''}" onclick="selectCategoryFilter('${c.name}')">
            <div class="bd-top">
              <span class="bd-name">${escapeHtml(c.name)}</span>
              <span class="bd-val mono">${fmt(c.amount)}원 · ${pct}%</span>
            </div>
            <div class="bd-track"><div class="bd-fill" style="width:${pct}%; background:${barColor};"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ${selectedCategoryFilter ? `
      <div style="padding:0 20px 20px;">
        <p class="section-label" style="margin:0 0 6px;">${escapeHtml(selectedCategoryFilter)} 지출 내역</p>
        <div class="ledger">${renderRows(monthEntries.filter(e=>e.type==='expense' && e.category === selectedCategoryFilter), '해당 분류로 기록된 지출이 없습니다.')}</div>
      </div>
    ` : ''}`;

  const paymentTabHtml = `
    <div class="breakdown">
      <p class="section-label" style="margin:0 0 8px;">${monthLabel(currentMonth)} 결제 수단별 지출</p>
      <div class="breakdown-card">
        ${paymentBreakdown.length === 0
          ? `<div class="ledger-empty" style="padding:8px 0;">이번 달 지출 기록이 없습니다.</div>`
          : paymentBreakdown.map(p=>{
              const pct = monthExpense ? Math.round((p.amount/monthExpense)*100) : 0;
              const active = selectedPaymentMethod === p.name;
              const barColor = paymentColor(p.name);
              return `
              <div class="bd-row payment-row ${active ? 'active' : ''}" onclick="selectPaymentFilter('${p.name}')">
                <div class="pay-icon">${icon(paymentIcon(p.name), 15, barColor)}</div>
                <div style="flex:1; min-width:0;">
                  <div class="bd-top">
                    <span class="bd-name">${escapeHtml(p.name)}</span>
                    <span class="bd-val mono">${fmt(p.amount)}원 · ${pct}% · ${p.count}건</span>
                  </div>
                  <div class="bd-track"><div class="bd-fill" style="width:${pct}%; background:${barColor};"></div></div>
                </div>
              </div>`;
            }).join('')}
      </div>
      ${paymentBreakdown.length > 0 ? `
      <div class="payment-total mono">
        <span>합계</span><span>${fmt(monthExpense)}원</span>
      </div>` : ''}
    </div>
    ${selectedPaymentMethod ? `
      <div style="padding:0 20px 20px;">
        <p class="section-label" style="margin:0 0 6px;">${escapeHtml(selectedPaymentMethod)} 결제 내역</p>
        <div class="ledger">${renderRows(monthEntries.filter(e=>e.payment === selectedPaymentMethod), '해당 결제 수단으로 기록된 지출이 없습니다.')}</div>
      </div>
    ` : ''}`;

  const ledgerHtml = `
    <div class="cover">
      <div class="ring1"></div>
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <p class="balance-label">총 잔액</p>
          <p class="balance-value mono">${fmt(totalBalance)}<span>원</span></p>
        </div>
        <button class="settings-btn" onclick="openSettings()">${icon('settings',18,'#FFFFFF')}</button>
      </div>
    </div>

    <div class="month-nav">
      <button onclick="changeMonth(-1)">${icon('chevron-left',20)}</button>
      <span class="serif">${monthLabel(currentMonth)}</span>
      <button onclick="changeMonth(1)">${icon('chevron-right',20)}</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn ${activeTab==='ledger' ? 'active' : ''}" onclick="switchTab('ledger')">내역</button>
      <button class="tab-btn ${activeTab==='payment' ? 'active' : ''}" onclick="switchTab('payment')">결제 수단별</button>
    </div>

    <div class="summary">
      <div class="card income"><p>이번 달 수입</p><p class="mono">+${fmt(monthIncome)}원</p></div>
      <div class="card expense"><p>이번 달 지출</p><p class="mono">-${fmt(monthExpense)}원</p></div>
    </div>

    ${errorMsg ? `<div class="error-box">${escapeHtml(errorMsg)}</div>` : ''}

    ${activeTab === 'ledger' ? `
      ${futureEntries.length > 0 ? `
        <p class="section-label">예정</p>
        <div class="ledger" style="margin-bottom:20px;">${upcomingRowsHtml}</div>
      ` : ''}
      <p class="section-label">거래 내역</p>
      <div class="ledger">${rowsHtml}</div>
      ${breakdownHtml}
    ` : paymentTabHtml}

    <div class="fab-wrap">
      <button class="fab-income" onclick="openForm('income')">${icon('plus',14)} 수입</button>
      <button class="fab-expense" onclick="openForm('expense')">${icon('minus',16)} 지출</button>
    </div>

    <div class="overlay ${formOpen ? 'open' : ''}" onclick="closeForm()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <h2 class="serif">${form.type==='income' ? (editingId ? '수입 수정' : '수입 기록') : ''}</h2>
          <button onclick="closeForm()">${icon('x',20)}</button>
        </div>
        ${form.type === 'expense' ? `<p class="field-label">지출 분류</p>` : ''}
        <div class="cat-grid">
          ${activeCats.map(c=>{
            const active = form.category === c.name;
            return `<div class="cat-opt" style="${categoryChipStyle(form.type, c.name, active)}" onclick="selectCategory('${c.name}')">${icon(c.icon,15,categoryChipIconColor(form.type, c.name, active))} ${c.name}</div>`;
          }).join('')}
        </div>
        ${form.type === 'expense' ? `
        <p class="field-label">결제 방식</p>
        <div class="pay-grid">
          ${paymentMethods.map(p=>{
            const active = form.payment === p;
            return `<div class="pay-opt" style="${paymentChipStyle(p, active)}" onclick="selectPayment('${p}')">${p}</div>`;
          }).join('')}
        </div>` : ''}
        <div class="field-row">
          <input id="f-date" type="date" class="field mono" value="${form.date}">
          ${form.type === 'expense' ? `<input id="f-time" type="time" class="field mono" value="${form.time || currentTimeStr()}">` : ''}
        </div>
        <input id="f-amount" type="text" inputmode="numeric" placeholder="금액 (원)" class="field mono" value="${form.amount}">
        <input id="f-memo" type="text" placeholder="메모 (선택)" class="field" value="${form.memo}">
        <button class="submit-btn" style="background:${form.type==='income' ? 'var(--stamp-green)' : 'var(--stamp-red)'}" onclick="submitForm()">${editingId ? '수정하기' : '기록하기'}</button>
      </div>
    </div>

    <div class="overlay center ${confirmDeleteId ? 'open' : ''}" onclick="cancelDelete()">
      <div class="modal modal-confirm" onclick="event.stopPropagation()">
        <p class="confirm-text">이 기록을 삭제할까요? 삭제하면 되돌릴 수 없습니다.</p>
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="cancelDelete()">취소</button>
          <button class="btn-delete" onclick="doDelete()">삭제</button>
        </div>
      </div>
    </div>

    <div class="overlay settings-overlay ${settingsOpen ? 'open' : ''}">
      <div class="settings-screen">
        <div class="settings-header">
          <button onclick="closeSettings()">${icon('chevron-left',22)}</button>
          <h2>설정</h2>
        </div>
        <div style="padding:20px;">
        <div class="tab-bar" style="padding:0 0 14px;">
          <button class="tab-btn" style="${settingsTab==='category' ? 'background:linear-gradient(135deg,var(--cover),var(--cover-light));color:#fff;' : ''}" onclick="switchSettingsTab('category')">지출 분류</button>
          <button class="tab-btn" style="${settingsTab==='payment' ? 'background:linear-gradient(135deg,var(--cover),var(--cover-light));color:#fff;' : ''}" onclick="switchSettingsTab('payment')">결제 방식</button>
        </div>
        ${settingsTab === 'category' ? `
          <div class="settings-list">
            ${expenseCats.map(c => `
              <div class="settings-row">
                <span class="settings-row-icon" style="background:${catBadgeColor('expense', c.name)};">${icon(c.icon,15,'#FFFFFF')}</span>
                <input type="text" class="settings-name-input" value="${escapeHtml(c.name)}" onchange="renameCategory('${escapeHtml(c.name)}', this.value)">
                <button class="settings-icon-btn" onclick="askDeleteCategory('${escapeHtml(c.name)}')">삭제</button>
              </div>
            `).join('')}
          </div>
          <div class="add-row">
            <input id="new-cat-name" type="text" class="field" placeholder="새 지출 분류 이름">
            <button onclick="addCategory()">추가</button>
          </div>
        ` : `
          <div class="settings-list">
            ${paymentMethods.map(p => `
              <div class="settings-row">
                <span class="asset-cat-dot" style="background:${paymentColor(p)};"></span>
                <input type="text" class="settings-name-input" value="${escapeHtml(p)}" onchange="renamePaymentMethod('${escapeHtml(p)}', this.value)">
                <button class="settings-icon-btn" onclick="askDeletePayment('${escapeHtml(p)}')">삭제</button>
              </div>
            `).join('')}
          </div>
          <div class="add-row">
            <input id="new-pay-name" type="text" class="field" placeholder="새 결제 방식 이름">
            <button onclick="addPaymentMethod()">추가</button>
          </div>
        `}
        </div>
      </div>
    </div>

    <div class="overlay center ${deleteCategoryTarget ? 'open' : ''}" onclick="cancelDeleteCategory()">
      <div class="modal modal-confirm" onclick="event.stopPropagation()">
        <p class="confirm-text">'${deleteCategoryTarget ? escapeHtml(deleteCategoryTarget) : ''}' 분류를 삭제할까요? 이미 기록된 지출의 분류는 그대로 남아요.</p>
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="cancelDeleteCategory()">취소</button>
          <button class="btn-delete" onclick="doDeleteCategory()">삭제</button>
        </div>
      </div>
    </div>

    <div class="overlay center ${deletePaymentTarget ? 'open' : ''}" onclick="cancelDeletePayment()">
      <div class="modal modal-confirm" onclick="event.stopPropagation()">
        <p class="confirm-text">'${deletePaymentTarget ? escapeHtml(deletePaymentTarget) : ''}' 결제 방식을 삭제할까요? 이미 기록된 내역의 결제 방식은 그대로 남아요.</p>
        <div class="confirm-actions">
          <button class="btn-cancel" onclick="cancelDeletePayment()">취소</button>
          <button class="btn-delete" onclick="doDeletePayment()">삭제</button>
        </div>
      </div>
    </div>
  `;

  let tabContent;
  if(topTab === 'ledger') tabContent = ledgerHtml;
  else if(topTab === 'fixed') tabContent = renderFixedTab();
  else if(topTab === 'asset') tabContent = renderAssetTab();
  else if(topTab === 'salary') tabContent = renderSalaryTab();
  else tabContent = ledgerHtml;

  document.getElementById('app').innerHTML = `
    <div class="top-tab-bar">
      <button class="top-tab-btn ${topTab==='ledger' ? 'active' : ''}" onclick="switchTopTab('ledger')">가계부</button>
      <button class="top-tab-btn ${topTab==='fixed' ? 'active' : ''}" onclick="switchTopTab('fixed')">고정비</button>
      <button class="top-tab-btn ${topTab==='asset' ? 'active' : ''}" onclick="switchTopTab('asset')">자산</button>
      <button class="top-tab-btn ${topTab==='salary' ? 'active' : ''}" onclick="switchTopTab('salary')">월급 관리</button>
    </div>
    ${tabContent}
  `;
}

function changeMonth(delta){
  currentMonth = shiftMonth(currentMonth, delta);
  selectedPaymentMethod = null;
  selectedCategoryFilter = null;
  render();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

(async function init(){
  await loadEntries();
  await loadFixedGroups();
  await loadFixedActiveGroup();
  await loadAssets();
  await loadAssetHistory();
  await loadSalaryGroups();
  await loadCategories();
  await loadPaymentMethods();
  render();
})();
</script>
</body>
</html>

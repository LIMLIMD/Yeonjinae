<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<link rel="icon" type="image/png" href="favicon-32.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1428A0">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --paper:#FFFFFF;
    --paper-line:#E3E6EE;
    --cover:#1428A0;
    --cover-light:#2F5FDE;
    --ink:#1B2233;
    --ink-faint:#6B7280;
    --stamp-red:#A8382C;
    --stamp-green:#2C6E49;
    --accent:#2F5FDE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    font-family:'Pretendard', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'Pretendard', sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-0.01em;}
  .serif{font-family:'Pretendard', sans-serif; font-weight:800; letter-spacing:-0.01em;}
  #app{max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:110px;}

  /* Top-level app tabs */
  .top-tab-bar{
    display:flex; background:var(--paper); position:sticky; top:0; z-index:30;
    border-bottom:1px solid var(--paper-line);
  }
  .top-tab-btn{
    flex:1; padding:13px 4px; background:none; border:none; cursor:pointer;
    font-size:13px; font-weight:500; color:var(--ink-faint);
    border-bottom:2px solid transparent;
  }
  .top-tab-btn.active{color:var(--cover); font-weight:700; border-bottom-color:var(--accent);}

  /* Cover */
  .cover{
    background:linear-gradient(160deg, var(--cover), var(--cover-light));
    padding:32px 20px 24px;
    position:relative;
    overflow:hidden;
  }
  .cover .ring1{position:absolute; right:-30px; top:-30px; width:140px; height:140px; border-radius:9999px; border:1.5px solid rgba(255,255,255,0.25);}
  .cover .ring2{position:absolute; right:10px; top:30px; width:90px; height:90px; border-radius:9999px; border:1px solid rgba(255,255,255,0.15);}
  .settings-btn{position:absolute; top:16px; right:16px; background:none; border:none; cursor:pointer; padding:6px; display:flex;}
  .eyebrow{color:rgba(255,255,255,0.65); letter-spacing:0.3em; font-size:11px; position:relative;}
  .cover h1{color:#FFFFFF; font-size:30px; font-weight:700; margin:6px 0 0; position:relative;}
  .balance-label{color:rgba(255,255,255,0.65); font-size:12px; margin:20px 0 2px; position:relative;}
  .balance-value{color:#FFFFFF; font-size:34px; font-weight:600; letter-spacing:-0.02em; margin:0; position:relative;}
  .balance-value span{font-size:16px; margin-left:4px;}

  /* Month nav */
  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 20px; border-bottom:1px solid var(--paper-line);
  }
  .month-nav button{background:none; border:none; color:var(--ink); cursor:pointer; padding:6px; display:flex;}
  .month-nav span{font-size:16px; font-weight:700;}

  /* Summary cards */
  .summary{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px 20px;}
  .card{background:#fff; border:1px solid var(--paper-line); border-radius:10px; padding:12px; box-shadow:0 1px 3px rgba(16,24,64,0.04);}
  .card p:first-child{color:var(--ink-faint); font-size:12px; margin:0 0 4px;}
  .card p:last-child{font-size:18px; font-weight:600; margin:0;}
  .card.income p:last-child{color:var(--stamp-green);}
  .card.expense p:last-child{color:var(--stamp-red);}

  .error-box{margin:0 20px 12px; padding:8px 12px; background:#FDECEA; color:var(--stamp-red); border-radius:8px; font-size:13px;}

  /* Ledger list */
  .section-label{color:var(--ink-faint); font-size:12px; margin:0 20px 6px; padding-top:4px;}
  .ledger{background:#fff; border:1px solid var(--paper-line); border-radius:10px; overflow:hidden; margin:0 20px; box-shadow:0 1px 3px rgba(16,24,64,0.04);}
  .ledger-empty{padding:24px; text-align:center; color:var(--ink-faint); font-size:13px;}
  .ledger-row{display:flex; align-items:center; gap:12px; padding:12px; border-bottom:1px dashed var(--paper-line); cursor:pointer;}
  .ledger-row:hover{background:#F5F7FC;}
  .ledger-row:last-child{border-bottom:none;}
  .cat-icon{
    width:34px; height:34px; border-radius:9999px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    border:1.5px solid var(--c); color:var(--c);
  }
  .row-main{flex:1; min-width:0;}
  .row-top{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .row-top .cat-name{font-size:14px; font-weight:500;}
  .row-top .row-date{color:var(--ink-faint); font-size:11px;}
  .row-memo{color:var(--ink-faint); font-size:12px; margin:1px 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row-amt{text-align:right; flex-shrink:0;}
  .row-amt p{margin:0;}
  .row-amt .amt{font-size:14px; font-weight:600;}
  .row-amt .bal{color:var(--ink-faint); font-size:10px;}
  .del-btn{background:none; border:none; color:var(--ink-faint); cursor:pointer; flex-shrink:0; margin-left:2px; padding:4px;}

  /* Tab bar */
  .tab-bar{display:flex; gap:8px; padding:14px 20px 0;}
  .tab-btn{
    flex:1; padding:9px; border-radius:9999px; border:1px solid var(--paper-line);
    background:#fff; color:var(--ink-faint); font-size:13px; font-weight:500; cursor:pointer;
  }
  .tab-btn.active{background:var(--cover); border-color:var(--cover); color:#FFFFFF; font-weight:700;}

  /* Category breakdown */
  .breakdown{padding:20px;}
  .breakdown-card{background:#fff; border:1px solid var(--paper-line); border-radius:10px; padding:16px; box-shadow:0 1px 3px rgba(16,24,64,0.04);}
  .bd-row{margin-bottom:12px;}
  .bd-row:last-child{margin-bottom:0;}
  .bd-top{display:flex; justify-content:space-between; margin-bottom:4px;}
  .bd-top .bd-name{font-size:13px;}
  .bd-top .bd-val{color:var(--ink-faint); font-size:12px;}
  .bd-track{background:var(--paper-line); height:6px; border-radius:3px; overflow:hidden;}
  .bd-fill{background:var(--stamp-red); height:100%;}
  .payment-row{display:flex; align-items:flex-start; gap:10px; cursor:pointer; padding:6px; margin:-6px -6px 6px; border-radius:8px;}
  .payment-row:hover{background:#F5F7FC;}
  .payment-row.active{background:#EAF0FE;}
  .pay-icon{color:var(--stamp-red); flex-shrink:0; margin-top:2px;}
  .payment-total{
    display:flex; justify-content:space-between; margin-top:14px; padding-top:12px;
    border-top:1px solid var(--paper-line); font-size:13px; font-weight:700; color:var(--ink);
  }

  /* Payment tag on ledger row */
  .row-payment{
    color:var(--ink-faint); font-size:10px; border:1px solid var(--paper-line);
    border-radius:9999px; padding:1px 7px; flex-shrink:0;
  }

  /* Payment chips in form */
  .pay-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;}
  .pay-opt{display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:8px; font-size:13px; background:#fff; border:1px solid var(--paper-line); color:var(--ink); cursor:pointer;}
  .pay-opt.active{border-color:var(--accent); color:var(--accent); background:#EAF0FE;}

  /* Floating buttons */
  .fab-wrap{position:fixed; bottom:20px; right:max(20px, calc(50% - 220px)); display:flex; flex-direction:column; gap:8px; align-items:flex-end; z-index:40;}
  .fab-income{background:#fff; border:1.5px solid var(--stamp-green); color:var(--stamp-green); border-radius:9999px; padding:8px 16px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:4px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .fab-expense{background:var(--stamp-red); color:#fff; border:none; border-radius:9999px; padding:12px 20px; font-size:14px; font-weight:700; display:flex; align-items:center; gap:4px; cursor:pointer; box-shadow:0 4px 12px rgba(168,56,44,0.35);}
  .fab-wrap button:active{transform:scale(0.96);}

  /* Modal */
  .overlay{position:fixed; inset:0; background:rgba(15,20,15,0.4); z-index:50; display:none; align-items:flex-end; justify-content:center;}
  .overlay.open{display:flex;}
  .overlay.center{align-items:center; padding:0 32px;}
  .modal{width:100%; max-width:480px; background:var(--paper); border-top-left-radius:20px; border-top-right-radius:20px; padding:20px;}
  .modal-confirm{max-width:360px; background:#fff; border-radius:14px;}
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .modal-head h2{font-size:18px; font-weight:700; margin:0;}
  .modal-head button{background:none; border:none; color:var(--ink-faint); cursor:pointer;}
  .cat-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;}
  .cat-opt{display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; font-size:13px; background:#fff; border:1px solid var(--paper-line); color:var(--ink); cursor:pointer;}
  .cat-opt.active-expense{border-color:var(--stamp-red); color:var(--stamp-red);}
  .cat-opt.active-income{border-color:var(--stamp-green); color:var(--stamp-green);}
  .field{width:100%; padding:10px 12px; margin-bottom:12px; border:1px solid var(--paper-line); border-radius:8px; font-size:14px; font-family:inherit;}
  .field.mono{font-size:16px;}
  .field-row{display:flex; gap:8px;}
  .field-row .field{flex:1; min-width:0;}
  .field-label{color:var(--ink-faint); font-size:12px; margin:0 0 6px;}
  .submit-btn{width:100%; padding:14px; border:none; border-radius:9999px; font-size:15px; font-weight:700; color:#fff; cursor:pointer;}
  .confirm-text{font-size:14px; margin:0 0 16px;}
  .confirm-actions{display:flex; gap:8px;}
  .confirm-actions button{flex:1; padding:10px; border-radius:8px; font-size:13px; cursor:pointer;}
  .btn-cancel{background:#fff; border:1px solid var(--paper-line); color:var(--ink);}
  .btn-delete{background:var(--stamp-red); border:none; color:#fff;}
  .loading{display:flex; align-items:center; justify-content:center; min-height:100vh; color:var(--ink-faint); font-size:14px;}

  /* Fixed expenses (고정비) */
  .fixed-card{background:#fff; border:1px solid var(--paper-line); border-radius:10px; overflow:hidden; margin-bottom:16px; box-shadow:0 1px 3px rgba(16,24,64,0.04);}
  .fixed-card-head{display:flex; justify-content:space-between; align-items:flex-start; padding:14px 16px; border-bottom:1px solid var(--paper-line); background:#F5F7FC;}
  .fg-name{font-size:14px; font-weight:700; color:var(--ink); margin:0;}
  .fg-count{font-size:11px; color:var(--ink-faint); margin:2px 0 0;}
  .fg-total{font-size:15px; font-weight:700; color:var(--stamp-red); margin:0;}
  .fg-del-btn{background:none; border:none; color:var(--ink-faint); font-size:11px; text-decoration:underline; cursor:pointer; margin-top:4px; padding:0;}
  .fixed-row{display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px dashed var(--paper-line); cursor:pointer;}
  .fixed-row:hover{background:#F5F7FC;}
  .fixed-row:last-child{border-bottom:none;}
  .fixed-checkbox{
    width:20px; height:20px; flex-shrink:0; border-radius:5px; border:1.5px solid var(--paper-line);
    cursor:pointer; display:flex; align-items:center; justify-content:center; background:#fff;
  }
  .fixed-checkbox.checked{background:var(--stamp-green); border-color:var(--stamp-green);}
  .fixed-main{flex:1; min-width:0;}
  .fixed-name-row{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .fixed-name{font-size:14px; color:var(--ink); margin:0;}
  .pay-tag{font-size:10px; font-weight:700; padding:2px 8px; border-radius:9999px; border:1px solid; white-space:nowrap;}
  .fixed-meta{color:var(--ink-faint); font-size:11px; margin:2px 0 0;}
  .fixed-amt{font-size:14px; font-weight:600; color:var(--ink); flex-shrink:0;}
  .fixed-add-btn{
    width:100%; padding:12px; background:none; border:none; border-top:1px dashed var(--paper-line);
    color:var(--ink-faint); font-size:13px; cursor:pointer;
  }
  .fixed-add-btn:hover{background:#F5F7FC;}
  .fixed-total-row{
    display:flex; justify-content:space-between; padding:12px 16px; border-top:1px solid var(--paper-line);
    background:#F5F7FC; font-size:13px; font-weight:700; color:var(--ink);
  }
  .asset-date-row{
    display:flex; align-items:center; justify-content:space-between; padding:10px 16px;
    border-bottom:1px solid var(--paper-line); font-size:12px; color:var(--ink-faint); background:#F5F7FC;
  }
  .asset-date-row input{border:1px solid var(--paper-line); border-radius:6px; padding:4px 8px; font-size:12px; color:var(--ink); font-family:inherit;}
  .add-group-btn{
    width:100%; padding:12px; background:#fff; border:1px dashed var(--paper-line); border-radius:10px;
    color:var(--ink-faint); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .prepaid-row{display:flex; align-items:center; gap:8px; margin-bottom:14px; cursor:pointer; font-size:13px; color:var(--ink);}

  /* Settings: category & payment method management */
  .settings-list{max-height:260px; overflow-y:auto; margin-bottom:12px;}
  .fixed-check-row{
    display:grid; grid-template-columns:18px 1fr 72px 88px; align-items:center; gap:8px;
    padding:8px 0; border-bottom:1px dashed var(--paper-line);
    font-size:13px; color:var(--ink); cursor:pointer;
  }
  .fixed-check-row:last-child{border-bottom:none;}
  .fixed-check-row input[type="checkbox"]{width:16px; height:16px;}
  .fixed-check-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0;}
  .fixed-check-row .pay-tag{justify-self:start; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fixed-check-row .mono{text-align:right; justify-self:end;}
  .salary-total-row{
    display:flex; justify-content:space-between; align-items:center; padding:12px 14px; margin-bottom:14px;
    background:#F5F7FC; border-radius:8px; font-size:14px; font-weight:700; color:var(--ink);
  }
  .settings-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px dashed var(--paper-line);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row-icon{color:var(--ink-faint); flex-shrink:0; display:flex;}
  .settings-name-input{
    flex:1; min-width:0; border:1px solid transparent; background:none; padding:6px 8px; border-radius:6px;
    font-size:14px; color:var(--ink); font-family:inherit;
  }
  .settings-name-input:focus{border-color:var(--paper-line); background:#fff; outline:none;}
  .settings-icon-btn{background:none; border:none; color:var(--ink-faint); cursor:pointer; padding:4px; flex-shrink:0;}
  .add-row{display:flex; gap:8px;}
  .add-row .field{flex:1; margin-bottom:0;}
  .add-row button{
    padding:0 16px; border:none; border-radius:8px; background:var(--accent); color:#fff;
    font-size:13px; font-weight:600; cursor:pointer;
  }

  svg{display:block;}
</style>
</head>

function copyToClipboard(text, btnEl){
  const showCopied = () => {
    if(!btnEl) return;
    const original = btnEl.innerHTML;
    btnEl.innerHTML = icon('check', 14, 'var(--stamp-green)');
    setTimeout(() => { btnEl.innerHTML = original; }, 1200);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showCopied).catch(showCopied);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    showCopied();
  }
}

// Storage wrapper:
// - Inside a Claude artifact, uses window.storage.
// - Outside Claude (this file opened/hosted directly), syncs with Supabase so data
//   is shared across devices/browsers, and falls back to localStorage if the
//   network/Supabase call fails (so the app still works offline).
const SUPABASE_URL = 'https://djeczuzsrmfaktiuqhqs.supabase.co/rest/v1/';
const SUPABASE_KEY = 'sb_publishable_yntqlWZfKgUnyrDn0vSVmQ_uda29sEP';

async function storageGet(key){
  if(typeof window.storage !== 'undefined' && window.storage){
    return await window.storage.get(key, false);
  }
  try{
    const res = await fetch(`${SUPABASE_URL}app_storage?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      },
    });
    if(!res.ok) throw new Error('supabase get failed');
    const rows = await res.json();
    if(rows && rows.length > 0){
      const value = JSON.stringify(rows[0].value);
      localStorage.setItem(key, value); // keep a local cache for offline use
      return {key, value, shared:false};
    }
    return null;
  }catch(e){
    const v = localStorage.getItem(key);
    return v !== null ? {key, value: v, shared:false} : null;
  }
}
async function storageSet(key, value){
  if(typeof window.storage !== 'undefined' && window.storage){
    return await window.storage.set(key, value, false);
  }
  localStorage.setItem(key, value); // always cache locally first, so data is never lost
  try{
    const res = await fetch(`${SUPABASE_URL}app_storage?on_conflict=key`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal',
      },
      body: JSON.stringify([{key, value: JSON.parse(value), updated_at: new Date().toISOString()}]),
    });
    if(!res.ok) throw new Error('supabase set failed: ' + res.status);
  }catch(e){
    // Cloud sync failed (offline / network issue), but the data is safe in
    // localStorage on this device, so don't alarm the user — just log it.
    console.warn('Supabase sync failed, saved locally instead:', e);
  }
  return {key, value, shared:false};
}

function computeData(){
  const dt = (e) => `${e.date}T${e.time || '00:00'}`;
  const sortedAll = [...entries].sort((a,b)=> {
    const da = dt(a), db = dt(b);
    return da === db ? a.id-b.id : (da < db ? -1 : 1);
  });
  let running = 0;
  const withBalance = sortedAll.map(e=>{
    running += e.type === 'income' ? e.amount : -e.amount;
    return {...e, balance: running};
  });
  const inMonth = withBalance
    .filter(e=> monthKey(e.date) === currentMonth)
    .sort((a,b)=> {
      const da = dt(a), db = dt(b);
      return da === db ? b.id-a.id : (da > db ? -1 : 1);
    });

  const monthIncome = inMonth.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const monthExpense = inMonth.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

  const byCat = {};
  inMonth.filter(e=>e.type==='expense').forEach(e=>{
    byCat[e.category] = (byCat[e.category]||0) + e.amount;
  });
  const catBreakdown = Object.entries(byCat).map(([name,amount])=>({name,amount})).sort((a,b)=>b.amount-a.amount);

  const byPayment = {};
  inMonth.filter(e=>e.type==='expense').forEach(e=>{
    const key = e.payment || '미지정';
    if(!byPayment[key]) byPayment[key] = {amount:0, count:0};
    byPayment[key].amount += e.amount;
    byPayment[key].count += 1;
  });
  const paymentOrder = [...paymentMethods, '미지정'];
  const paymentBreakdown = paymentOrder
    .filter(name => byPayment[name])
    .map(name => ({name, amount: byPayment[name].amount, count: byPayment[name].count}))
    .sort((a,b)=>b.amount-a.amount);

  const totalBalance = withBalance.length ? withBalance[withBalance.length-1].balance : 0;

  return {monthEntries: inMonth, monthIncome, monthExpense, totalBalance, catBreakdown, paymentBreakdown};
}

      };
    }
  } else {
    const entry = {
      id: Date.now(),
      type: form.type,
      date: form.date,
      time: form.time,
      category: form.category,
      payment: form.type === 'expense' ? form.payment : undefined,

    };

  }

  editingId = null;
  render();
}

  salaryItemFormOpen = true;

function openEditSalaryItemForm(groupId, itemId){
  const g = salaryGroups.find(x => x.id === groupId);
  const it = g && g.items.find(x => x.id === itemId);
  if(!it) return;
  salaryEditingItemId = itemId;
  // Restore whichever fixed-expense items were checked last time.
  salaryCheckedFixedIds = [...(it.checkedFixedIds || [])];
  const fg = fixedGroups.find(f => f.name === g.name);
  const fixedSum = fg ? fg.items.filter(fi => salaryCheckedFixedIds.includes(fi.id)).reduce((s,fi)=>s+fi.amount,0) : 0;
  const extra = it.amount - fixedSum;
  salaryItemForm = {groupId, name:it.name, account:it.account || '', extraAmount:String(extra), amount:String(it.amount)};
  salaryItemFormOpen = true;
  render();
}
function closeSalaryItemForm(){
  salaryItemFormOpen = false;
  salaryEditingItemId = null;
  salaryCheckedFixedIds = [];
  render();
}
function matchedFixedGroupForSalary(){
  const sg = salaryGroups.find(x => x.id === salaryItemForm.groupId);
  if(!sg) return null;
  return fixedGroups.find(fg => fg.name === sg.name) || null;
}
function recomputeSalaryAmount(){
  const fg = matchedFixedGroupForSalary();
  const fixedSum = fg ? fg.items.filter(it => salaryCheckedFixedIds.includes(it.id)).reduce((s,it)=>s+it.amount,0) : 0;
  const extra = parseInt((salaryItemForm.extraAmount || '').replace(/[^0-9-]/g,''), 10) || 0;
  salaryItemForm.amount = String(fixedSum + extra);
}
function updateSalaryTotalDisplay(){
  const totalEl = document.getElementById('salary-total-value');
  if(!totalEl) return;
  const n = parseInt(salaryItemForm.amount, 10) || 0;
  totalEl.textContent = (n < 0 ? '-' : '') + fmt(Math.abs(n)) + '원';
}
function toggleSalaryFixedCheck(fixedItemId){
  const idx = salaryCheckedFixedIds.indexOf(fixedItemId);
  if(idx === -1) salaryCheckedFixedIds.push(fixedItemId);
  else salaryCheckedFixedIds.splice(idx, 1);

  recomputeSalaryAmount();
  updateSalaryTotalDisplay();
}
function updateSalaryExtraAmount(value){
  salaryItemForm.extraAmount = value;

  updateSalaryTotalDisplay();
}

function renderRows(list, emptyMessage){

    return `<div class="ledger-empty">${emptyMessage || '표시할 기록이 없습니다.'}</div>`;
  }
  return list.map(e=>{
    const isIncome = e.type === 'income';
    const color = isIncome ? 'var(--stamp-green)' : 'var(--stamp-red)';
    return `
    <div class="ledger-row" onclick="openEditForm(${e.id})">
      <div class="cat-icon" style="--c:${color}">${icon(catIcon(e.type,e.category), 16, color)}</div>
      <div class="row-main">
        <div class="row-top">
          <span class="cat-name">${escapeHtml(e.category)}</span>
          <span class="row-date mono">${e.date.slice(5).replace('-','/')}${e.time ? ' ' + e.time : ''}</span>
          ${e.payment ? `<span class="row-payment">${escapeHtml(e.payment)}</span>` : ''}
        </div>
        ${e.memo ? `<p class="row-memo">${escapeHtml(e.memo)}</p>` : ''}
      </div>
      <div class="row-amt">
        <p class="amt mono" style="color:${color}">${isIncome?'+':'-'}${fmt(e.amount)}</p>
        <p class="bal mono">잔액 ${fmt(e.balance)}</p>
      </div>
      <button class="del-btn" onclick="event.stopPropagation(); askDelete(${e.id})">${icon('trash-2',14)}</button>
    </div>`;
  }).join('');
}

  function renderGroupCard(g){

    const rows = g.items.length === 0
      ? `<div class="ledger-empty">등록된 항목이 없습니다.</div>`

    <div style="padding:20px;">

        <input id="si-account" type="text" inputmode="text" placeholder="계좌번호 (선택)" class="field mono" value="${escapeHtml(salaryItemForm.account || '')}">
        ${matchedFixedGroup && matchedFixedGroup.items.length ? `

      <button class="top-tab-btn ${topTab==='salary' ? 'active' : ''}" onclick="switchTopTab('salary')">월급 관리</button>
    </div>
    ${tabContent}
  `;
}

function changeMonth(delta){
  currentMonth = shiftMonth(currentMonth, delta);
  selectedPaymentMethod = null;
  render();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

(async function init(){
  await loadEntries();
  await loadFixedGroups();
  await loadFixedActiveGroup();
  await loadAssets();
  await loadSalaryGroups();
  await loadCategories();
  await loadPaymentMethods();
  render();
})();
</script>
</body>
